<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="topper">
        <div class="logo">logo</div>
        <div class="links">
            <a href="javascript:void(0)">header link 1</a>
            <a href="javascript:void(0)">header link 2</a>
            <a href="javascript:void(0)">header link 3</a>
            <!--I will be adding more to these links in the future-->
        </div>
    </div>
    <div class="title">
        <div class="leftbox"> <!--leftbox and rightbox are simply containers so I can format the title with flexbox.-->
            <div class="title_heading">This website is awesome</div>
            <div class="title_blurb">This is a smaller blurb about the film</div>
            <button class="title_button">Take my money</button>
        </div>
        <div class="rightbox">
            <img src="/images/Swordsail.png" class="bookcover" height="200px" width="128px"> <!--This is a placeholder image unitl I can get the full, 3d-looking book cover file. BE SURE TO ADD ALT TEXT-->
        </div>

    </div>
    <div class="info">
        <div class="info_header">Some random information</div>
        <div class="info_images">
            <figure class="Jorgen">
                <img src="images/Captain.png" height="150px" width="150px" alt="a hand-drawn image of a viking">
                <figcaption>Follow Captain Jorgen as he and his crew sail off the edge of the earth.</figcaption>
            </figure>

            <figure class="reader">
                <img src="images/woman_reading.png" height="150px" width="150px" alt="a woman wearing glasses reading an old, worn book">
                <figcaption>Features riveting prose, amusing dialogue and 0hz refresh rate. </figcaption>
            </figure>
            
            <figure class="bookstore">
                <img src="images/bookstore.png" height="150px" width="150px" alt="a bookstore with a man and a woman, featuring warm, cozy lighting and floor-to-ceiling shelves.">
                <figcaption>Whenever it releases, it should be available in bookstores. </figcaption>
            </figure>

            <figure class="thumbs">
                <img src="images/thumbs_up.png" height="150px" width="150px" alt="a man on the beach giving a thumbs-up and smiling..">
                <figcaption>A real reviewer: "The best-written thing I have read since the back of the cereal box" </figcaption>
            </figure>


            <!--Images will go here once they are made, as well as text for what the images will be about.-->

        </div>
    </div>
    <div class="quote">
        <blockquote class="realquote">This is a real quote from somebody who has seen the movie</blockquote>
        <p>The person who said it, probably.</p>
    </div>
    <div class="buy">
        <div class="leftbuy"> <!--Like above with the title section, splitting this into leftbuy and rightbuy means that it will be easier to format with flexbox.-->
        <h4>Get the tickets now!</h5>
            <p class="ticket">Get the tickets pls</p>
        </div>
    <div class="rightbuy">
        <button class="buy_button">Take my money NOW</button>
    </div>

    </div>
    <div class="disclaim">
        <p class="handicraft">Coded by hand. No AI used.</p>
    </div>
</body>
</html>
